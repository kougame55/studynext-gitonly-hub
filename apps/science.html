<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>理科クイズラボ</title><style>
:root{--bg:#f6f9ff;--ink:#142033;--muted:#65758d;--panel:#fff;--panel2:#eef5ff;--line:#d9e5f6;--accent:#1769ff;--accent2:#00a7c8;--ok:#0f9f6e;--bad:#d9365f;--shadow:0 18px 54px rgba(38,74,130,.16);--r:8px}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:linear-gradient(135deg,#f7fbff,#edf5ff);color:var(--ink);font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI","Noto Sans JP",sans-serif}button{font:inherit;cursor:pointer}.wrap{width:min(900px,100%);margin:auto;padding:22px}.top{display:flex;justify-content:space-between;gap:12px}.brand{font-weight:950;color:var(--accent)}.card{background:white;border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:20px}.q{font-size:clamp(1.8rem,5vw,3.2rem);font-weight:1000;line-height:1.25;margin:26px 0;color:var(--ink)}.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px}.choices button,.primary,.secondary{border:1px solid var(--line);border-radius:var(--r);font-weight:950;padding:14px;background:white;color:var(--ink)}.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;border:0}.secondary{background:var(--panel2)}.meta{color:var(--muted);line-height:1.6}.score{font-weight:950;color:var(--accent)}@media(max-width:560px){.choices{grid-template-columns:1fr}.top{flex-direction:column}}
</style></head><body><div class="wrap"><div class="top"><div><div class="brand">StudyNext / 理科クイズラボ</div><p id="user" class="meta"></p></div><button class="secondary" onclick="backPortal()">ポータルへ</button></div><main class="card"><div class="meta">身近な理科をテンポよく確認</div><div id="q" class="q"></div><div id="choices" class="choices"></div><p id="score" class="score"></p><button class="primary" style="width:100%;margin-top:12px" onclick="restart()">もう一度</button></main></div><script>
const PROFILE_KEY="studynext_profile_v3";const DATA=[["植物が光を使って養分をつくることを何という？","光合成"],["水が氷になる変化は？","凝固"],["電気を通しやすいものは？","金属"],["月が地球のまわりを回る周期はおよそ？","1か月"],["空気中で一番多い気体は？","窒素"],["方位磁針のN極はどちらを指す？","北"],["てこの支える点を何という？","支点"],["食塩水を蒸発させると残るものは？","食塩"]];let i=0,ok=0,total=0,start=new Date();const p=()=>{try{return JSON.parse(localStorage.getItem(PROFILE_KEY)||"null")}catch{return null}};const sh=a=>[...a].sort(()=>Math.random()-.5);function next(){if(i>=DATA.length)return finish();const item=DATA[i];q.textContent=item[0];choices.innerHTML=sh([item[1],...sh(DATA.map(x=>x[1]).filter(x=>x!==item[1])).slice(0,3)]).map(v=>`<button onclick="answer('${v}')">${v}</button>`).join("");score.textContent=`${ok} / ${total}`}function answer(v){total++;if(v===DATA[i][1])ok++;i++;next()}function restart(){i=0;ok=0;total=0;start=new Date();next()}function finish(){q.textContent="実験完了";choices.innerHTML="";score.textContent=`${ok} / ${total} 正解`;sendUsage({event:"app_result",result:{correct:ok,total}})}function sendUsage(extra){const me=p(),end=new Date();parent.postMessage({type:"studynext:usage",payload:{appId:"science",appTitle:"理科クイズラボ",uid:me?.uid||"",studentId:me?.studentId||"",realName:me?.realName||me?.displayName||me?.email||"",classId:me?.classId||"",teacherUid:me?.teacherUid||"",startedAt:start.toISOString(),endedAt:end.toISOString(),durationSec:Math.max(1,Math.round((end-start)/1000)),dateKey:end.toISOString().slice(0,10),...extra}},"*")}function backPortal(){parent.postMessage({type:"studynext:back"},"*")}const me=p();user.textContent=me?(me.realName||me.displayName||me.email||me.studentId)+" で学習中":"ポータルから開くと記録されます";next();
</script></body></html>
