<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SPEED算数</title>
<style>
:root{--bg:#f6f9ff;--track:#dcecff;--panel:#ffffff;--panel2:rgba(23,105,255,.06);--line:rgba(23,105,255,.18);--text:#142033;--muted:#65758d;--yellow:#1769ff;--blue:#00a7c8;--green:#0f9f6e;--red:#d9365f;--purple:#1769ff;--shadow:0 18px 54px rgba(38,74,130,.16);--font:ui-sans-serif,system-ui,-apple-system,"Segoe UI","Noto Sans JP",sans-serif}
body.theme-light{--bg:#f7fbff;--track:#dcecff;--panel:#ffffff;--panel2:rgba(37,99,235,.06);--line:rgba(30,64,175,.18);--text:#102033;--muted:#52657e;--yellow:#2563eb;--blue:#0284c7;--green:#16a34a;--red:#dc2626;--purple:#7c3aed;--shadow:0 18px 54px rgba(37,99,235,.16)}
body.theme-black{--bg:#000;--track:#070707;--panel:#050505;--panel2:rgba(255,255,255,.06);--line:rgba(255,255,255,.18);--text:#fafafa;--muted:#a3a3a3;--yellow:#fff;--blue:#38bdf8;--green:#22c55e;--red:#ff2d55;--purple:#a78bfa;--shadow:0 22px 70px rgba(0,0,0,.7)}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow-x:hidden}button,input,select{font:inherit}.screen{display:none;min-height:100vh}.screen.active{display:flex}.bgGrid{position:fixed;inset:0;pointer-events:none;opacity:.24;background-image:linear-gradient(rgba(85,214,255,.14) 1px,transparent 1px),linear-gradient(90deg,rgba(85,214,255,.14) 1px,transparent 1px);background-size:40px 40px;mask-image:linear-gradient(to bottom,black,transparent 80%)}
#screen-start{align-items:center;justify-content:center;padding:24px;background:radial-gradient(circle at top,rgba(85,214,255,.2),transparent 34%),linear-gradient(145deg,var(--bg),var(--track))}.start{width:min(520px,100%);text-align:center;position:relative}.logo{font-size:clamp(2.9rem,12vw,5.2rem);line-height:.95;font-weight:1000;letter-spacing:-.08em;color:var(--yellow);text-shadow:0 0 36px color-mix(in srgb,var(--yellow),transparent 55%)}.subtitle{color:var(--muted);letter-spacing:.18em;margin:14px 0 22px}.carHero{font-size:4.6rem;display:block;margin-bottom:12px;transform:scaleX(-1);animation:float 1.9s ease-in-out infinite}@keyframes float{50%{transform:scaleX(-1) translateY(-10px)}}.userBox{border:1px solid var(--line);background:var(--panel2);border-radius:20px;padding:14px;margin:0 0 18px;line-height:1.7}.buttonStack{display:grid;gap:10px}.primary,.secondary,.chip,.cardBtn,.back,.choice,.key{border:1px solid var(--line);border-radius:14px;cursor:pointer;transition:.16s transform,.16s border-color,.16s background}.primary{padding:16px 18px;border-color:transparent;background:linear-gradient(135deg,var(--yellow),#fff2a5);color:#07101f;font-weight:1000;box-shadow:0 14px 34px rgba(248,230,91,.18)}.secondary{padding:13px 16px;background:var(--panel2);color:var(--text);font-weight:850}.primary:hover,.secondary:hover,.chip:hover,.cardBtn:hover,.choice:hover,.key:hover{transform:translateY(-2px)}
.panel{position:fixed;inset:0;background:rgba(0,0,0,.72);display:none;align-items:center;justify-content:center;z-index:5;padding:18px}.panel.active{display:flex}.panelBox{width:min(560px,100%);max-height:88vh;overflow:auto;background:var(--panel);border:1px solid var(--line);border-radius:24px;padding:20px;box-shadow:var(--shadow)}.panelTitle{display:flex;justify-content:space-between;gap:12px;align-items:center;font-weight:1000;font-size:1.1rem;color:var(--yellow);margin-bottom:14px}.row{display:grid;gap:8px;margin:12px 0}.row label{color:var(--muted);font-size:.9rem}.row input,.row select{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:12px;background:var(--panel2);color:var(--text)}
#screen-select{padding:18px;align-items:center;flex-direction:column}.topbar{width:min(760px,100%);display:flex;align-items:center;gap:12px;margin-bottom:16px}.back{padding:10px 13px;background:var(--panel2);color:var(--text)}.headline{font-weight:1000;color:var(--yellow)}.section{width:min(760px,100%);margin:0 0 14px}.section h3{margin:0 0 8px;font-size:.78rem;letter-spacing:.14em;color:var(--muted)}.chips{display:flex;flex-wrap:wrap;gap:8px}.chip{padding:9px 14px;background:var(--panel2);color:var(--text)}.chip.selected{background:var(--yellow);color:#07101f;border-color:transparent;font-weight:950}.unitScroll{max-height:170px;overflow:auto}.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.cardBtn{padding:14px 8px;text-align:center;background:var(--panel2);color:var(--text)}.cardBtn.selected{border-color:var(--yellow);background:color-mix(in srgb,var(--yellow),transparent 84%)}.cardBtn b{display:block;color:var(--yellow);font-size:.85rem}.cardBtn span{display:block;color:var(--muted);font-size:.72rem;margin-top:4px}.best{min-height:1.5em;color:var(--yellow);font-weight:850;text-align:center}
#screen-game{flex-direction:column}.hud{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;background:rgba(0,0,0,.28);border-bottom:1px solid var(--line)}.timer{font-size:2rem;font-weight:1000;color:var(--yellow);min-width:86px}.timer.danger{color:var(--red);animation:pulse .45s infinite}@keyframes pulse{50%{opacity:.45}}.score{text-align:center}.score b{display:block;font-size:1.5rem}.score span,.rank span{font-size:.72rem;color:var(--muted)}.streak{text-align:right;color:var(--green);font-weight:1000}.barWrap{height:6px;background:rgba(255,255,255,.07)}.bar{height:100%;width:100%;background:linear-gradient(90deg,var(--green),var(--yellow),var(--red));transition:width .12s}.race{height:150px;position:relative;overflow:hidden;border-bottom:1px solid var(--line);background:linear-gradient(#141924 0 18%,var(--track) 18% 82%,#141924 82%)}body.theme-light .race{background:linear-gradient(#e2e8f0 0 18%,var(--track) 18% 82%,#e2e8f0 82%)}.centerLine{position:absolute;left:0;right:0;top:50%;height:4px;background:repeating-linear-gradient(90deg,rgba(255,255,255,.7) 0 28px,transparent 28px 58px);animation:road .5s linear infinite}@keyframes road{to{background-position:-58px 0}}.car{position:absolute;top:50%;left:5%;transform:translateY(-50%);font-size:2.4rem;transition:left .45s cubic-bezier(.2,.8,.2,1);filter:drop-shadow(0 0 12px rgba(85,214,255,.55))}.ghost{position:absolute;font-size:1.55rem;transition:left .45s}.ghost small{position:absolute;left:50%;bottom:100%;transform:translateX(-50%);font-size:.55rem;color:var(--muted);white-space:nowrap}.rank{position:absolute;right:14px;top:50%;transform:translateY(-50%);padding:9px 12px;border:1px solid var(--line);border-radius:14px;background:rgba(0,0,0,.45);text-align:center}.rank b{font-size:1.5rem;color:var(--yellow)}.qa{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px;background:radial-gradient(circle at center,rgba(85,214,255,.08),transparent 56%)}.modeTag{color:var(--muted);font-size:.82rem;letter-spacing:.08em}.context{min-height:1.4em;margin:8px 0;color:var(--blue);font-weight:900}.question{font-size:clamp(2rem,8vw,4.2rem);font-weight:1000;text-align:center;line-height:1.15;margin:8px 0 22px}.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:min(520px,100%)}.choice{padding:18px 10px;background:var(--panel2);color:var(--text);font-weight:1000;font-size:1.2rem}.choice.correct{border-color:var(--green);background:color-mix(in srgb,var(--green),transparent 84%);color:var(--green)}.choice.wrong{border-color:var(--red);background:color-mix(in srgb,var(--red),transparent 86%);color:var(--red)}.typeArea{display:none;width:min(460px,100%)}.answerInput{width:100%;padding:16px;border:2px solid var(--line);border-radius:16px;background:var(--panel2);color:var(--text);font-size:2rem;text-align:center;font-weight:1000}.keys{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}.key{padding:15px 0;background:var(--panel2);color:var(--text);font-weight:950}.key.ok{grid-column:span 2;color:var(--yellow);border-color:var(--yellow)}.key.del{color:var(--red)}.history{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;min-height:16px;margin-top:16px}.dotHist{width:12px;height:12px;border-radius:50%;background:var(--red)}.dotHist.ok{background:var(--green)}.toast{position:fixed;left:50%;top:44%;transform:translate(-50%,-50%);z-index:10;font-size:2.2rem;font-weight:1000;opacity:0;pointer-events:none}.toast.show{animation:toast .75s ease-out}@keyframes toast{0%{opacity:1;transform:translate(-50%,-50%) scale(1.4)}100%{opacity:0;transform:translate(-50%,-120%) scale(.8)}}
#screen-result{align-items:center;justify-content:center;padding:20px;background:linear-gradient(145deg,var(--bg),var(--panel))}.result{width:min(540px,100%);text-align:center;background:var(--panel2);border:1px solid var(--line);border-radius:28px;padding:24px;box-shadow:var(--shadow)}.medal{font-size:2.4rem}.resultRank{font-size:4rem;line-height:1;font-weight:1000;color:var(--yellow)}.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:18px 0}.stat{padding:14px;border:1px solid var(--line);border-radius:16px;background:var(--panel2)}.stat b{display:block;font-size:1.7rem}.stat span{font-size:.8rem;color:var(--muted)}@media(max-width:640px){.cards{grid-template-columns:1fr}.choices{grid-template-columns:1fr}.topbar{align-items:flex-start}.timer{font-size:1.6rem}.race{height:126px}.question{font-size:2.2rem}}
</style>
</head>
<body>
<div class="bgGrid"></div>
<section id="screen-start" class="screen active"><div class="start"><span class="carHero">🏎️</span><div class="logo">SPEED<br>算数</div><div class="subtitle">最速計算チャレンジ</div><div id="userBox" class="userBox"></div><div class="buttonStack"><button class="primary" onclick="goSelect()">▶ スタート</button><button class="secondary" onclick="showPanel('rules')">📋 ルール</button><button class="secondary" onclick="showPanel('settings')">⚙ 設定</button><button class="secondary" onclick="backPortal()">← ポータルへ</button></div></div></section>
<div id="panel-rules" class="panel"><div class="panelBox"><div class="panelTitle">📋 ルール <button class="back" onclick="hidePanel('rules')">✕</button></div><p>制限時間内にできるだけ多く正解し、ゴーストカーを追い抜こう。</p><p>ノーマルは正解で+2秒、不正解で-3秒。サバイバルは1ミスで終了。アイテムではタイム回復やシールドが出ます。</p><p>文章・はい/いいえ問題は、難しいレベルでも自動で選択式になります。</p></div></div>
<div id="panel-settings" class="panel"><div class="panelBox"><div class="panelTitle">⚙ 設定 <button class="back" onclick="hidePanel('settings')">✕</button></div><div class="row"><label>表示名</label><input id="nameInput" maxlength="12"></div><div class="row"><label>入力モード</label><select id="inputMode"><option value="auto">自動</option><option value="choice">いつも選択式</option><option value="type">数字なら入力式</option></select></div><div class="row"><label>テーマ</label><select id="theme"><option value="default">ネオン</option><option value="light">ライト</option><option value="black">ブラック</option></select></div><div class="row"><label>効果音</label><select id="sfx"><option value="on">オン</option><option value="off">オフ</option></select></div><button class="primary" style="width:100%;margin-top:10px" onclick="saveSettings()">保存</button></div></div>
<section id="screen-select" class="screen"><div class="topbar"><button class="back" onclick="showScreen('start')">←</button><div class="headline">学年・単元・モードを選ぼう</div></div><div class="section"><h3>GRADE</h3><div id="grades" class="chips"></div></div><div class="section"><h3>UNIT</h3><div class="unitScroll"><div id="units" class="chips"></div></div></div><div class="section"><h3>MODE</h3><div class="cards"><button id="mode-normal" class="cardBtn selected" onclick="selectMode('normal')">⏱️<b>ノーマル</b><span>1分勝負</span></button><button id="mode-survival" class="cardBtn" onclick="selectMode('survival')">💀<b>サバイバル</b><span>ミスで終了</span></button><button id="mode-item" class="cardBtn" onclick="selectMode('item')">🎁<b>アイテム</b><span>効果発動</span></button></div></div><div class="section"><h3>LEVEL</h3><div class="cards"><button data-level="easy" class="cardBtn" onclick="selectLevel('easy')">🐢<b>かんたん</b><span>3択</span></button><button data-level="normal" class="cardBtn selected" onclick="selectLevel('normal')">🚗<b>ふつう</b><span>4択</span></button><button data-level="hard" class="cardBtn" onclick="selectLevel('hard')">🏎️<b>むずかしい</b><span>数字は入力</span></button></div></div><div class="best" id="best"></div><button class="primary" style="width:min(380px,100%)" onclick="startGame()">🏁 スタート</button></section>
<section id="screen-game" class="screen"><div class="hud"><div id="timer" class="timer">60.0</div><div class="score"><b id="score">0</b><span>正解数</span></div><div id="streak" class="streak">⚡ ×1</div></div><div class="barWrap"><div id="bar" class="bar"></div></div><div class="race"><div class="centerLine"></div><div id="cars"></div><div class="rank"><b id="rank">1</b><br><span>位</span></div></div><div class="qa"><div id="modeTag" class="modeTag"></div><div id="context" class="context"></div><div id="question" class="question"></div><div id="choices" class="choices"></div><div id="typeArea" class="typeArea"><input id="answerInput" class="answerInput" inputmode="decimal" autocomplete="off"><div class="keys"><button class="key" onclick="pressKey('7')">7</button><button class="key" onclick="pressKey('8')">8</button><button class="key" onclick="pressKey('9')">9</button><button class="key del" onclick="pressKey('del')">⌫</button><button class="key" onclick="pressKey('4')">4</button><button class="key" onclick="pressKey('5')">5</button><button class="key" onclick="pressKey('6')">6</button><button class="key" onclick="pressKey('-')">−</button><button class="key" onclick="pressKey('1')">1</button><button class="key" onclick="pressKey('2')">2</button><button class="key" onclick="pressKey('3')">3</button><button class="key" onclick="pressKey('.')">.</button><button class="key" onclick="pressKey('0')">0</button><button class="key" onclick="pressKey('00')">00</button><button class="key ok" onclick="submitTyped()">決定</button></div></div><div id="history" class="history"></div></div><div id="toast" class="toast"></div></section>
<section id="screen-result" class="screen"><div class="result"><div id="medal" class="medal">🏁</div><div id="resultRank" class="resultRank">1位</div><p id="resultMsg"></p><div class="stats"><div class="stat"><b id="resTotal">0</b><span>チャレンジ数</span></div><div class="stat"><b id="resCorrect">0</b><span>正解数</span></div><div class="stat"><b id="resAcc">0%</b><span>正答率</span></div><div class="stat"><b id="resStreak">0</b><span>最大連続</span></div></div><div class="buttonStack"><button class="primary" onclick="startGame()">もう一度</button><button class="secondary" onclick="showScreen('select')">モード変更</button><button class="secondary" onclick="showScreen('start')">トップへ</button></div></div></section>
<script>
'use strict';
const PROFILE_KEY='studynext_profile_v3';
const SESSION_KEY='studynext_session_v2';
const LEGACY_ACTIVE_KEY='studynext_active_user_v1';
const R=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const pick=a=>a[Math.floor(Math.random()*a.length)];
const gcd=(a,b)=>b?gcd(b,a%b):Math.abs(a);
const mkQ=(text,answer,context='')=>({text,answer:String(answer),context});
function qAdd(){const a=R(1,20),b=R(1,20);return mkQ(`${a} + ${b} = ?`,a+b,'たし算')}
function qSub(){const a=R(8,40),b=R(1,a-1);return mkQ(`${a} − ${b} = ?`,a-b,'ひき算')}
function qMul(){const a=R(2,9),b=R(2,9);return mkQ(`${a} × ${b} = ?`,a*b,'九九')}
function qDiv(){const b=R(2,9),q=R(2,12);return mkQ(`${b*q} ÷ ${b} = ?`,q,'わり算')}
function qTime(){const h=R(2,5);return pick([mkQ('1時間は何分?',60,'時間'),mkQ('1日は何時間?',24,'時間'),mkQ(`${h}時間は何分?`,h*60,'時間'),mkQ('60分は何時間?',1,'時間')])}
function qArea(){const w=R(2,12),h=R(2,12);return pick([mkQ(`縦${h}cm 横${w}cm の長方形の面積は?`,w*h,'面積'),mkQ(`一辺${w}cm の正方形の面積は?`,w*w,'面積')])}
function qDec(){const a=(R(10,90)/10).toFixed(1),b=(R(1,9)/10).toFixed(1);return mkQ(`${a} + ${b} = ?`,(parseFloat(a)+parseFloat(b)).toFixed(1),'小数')}
function qFrac(){const d=R(3,9),n=R(1,d-1);return pick([mkQ(`${d}分の${n} + ${d}分の1 = ${d}分の?`,n+1,'分数'),mkQ(`${d}分の${d} = ?`,1,'分数')])}
function qSym(){return pick([mkQ('長方形は点対称ですか?','はい','対称'),mkQ('正三角形は点対称ですか?','いいえ','対称'),mkQ('平行四辺形は点対称ですか?','はい','対称'),mkQ('正六角形の対称の軸は何本?',6,'対称'),mkQ('正方形の対称の軸は何本?',4,'対称')])}
function qRatio(){const a=R(2,8),b=R(2,8),g=gcd(a,b);return mkQ(`${a}:${b} を簡単な比にすると?`,`${a/g}:${b/g}`,'比')}
const CURRICULUM={1:[['1-a','たし算',qAdd],['1-s','ひき算',qSub]],2:[['2-m','九九',qMul],['2-t','時間',qTime]],3:[['3-d','わり算',qDiv],['3-a','面積',qArea]],4:[['4-dec','小数',qDec],['4-area','面積',qArea]],5:[['5-frac','分数',qFrac],['5-dec','小数',qDec]],6:[['6-sym','対称',qSym],['6-ratio','比',qRatio],['6-frac','分数',qFrac]]};
const GHOSTS=['アオイ','カイト','ハナ','リク','サクラ','ユイ','ミナト','コウ','リン','ナナ','ソラ','ミオ'].map((name,i)=>({name,score:[4,5,7,8,10,12,14,16,18,20,23,26][i],emoji:['🚗','🚙','🚕','🚌'][i%4]}));
const GS={grade:1,unit:'1-a',level:'normal',mode:'normal',timer:60,score:0,total:0,streak:0,bestStreak:0,history:[],locked:false,inputMode:'auto',activeInput:'choice',theme:'default',sfx:'on',name:'プレイヤー',best:{},totalCorrects:0,question:null,choices:[],correctIndex:0,ghosts:[],answerBuffer:'',interval:null,shield:false,item:null};
function activeProfile(){try{return JSON.parse(localStorage.getItem(PROFILE_KEY)||'null')}catch{return null}}
function session(){try{return JSON.parse(localStorage.getItem(SESSION_KEY)||'null')}catch{return null}}
function activeEmail(){const p=activeProfile();if(p)return p.email||p.realName||p.studentId||p.displayName;const s=session();if(s&&s.user&&s.user.email)return s.user.email;try{const l=JSON.parse(localStorage.getItem(LEGACY_ACTIVE_KEY)||'null');return l&&l.email}catch{return null}}
function save(){const email=activeEmail()||'guest';localStorage.setItem('speedData:'+email,JSON.stringify({name:GS.name,best:GS.best,totalCorrects:GS.totalCorrects,inputMode:GS.inputMode,theme:GS.theme,sfx:GS.sfx}))}
function load(){const email=activeEmail()||'guest';try{Object.assign(GS,JSON.parse(localStorage.getItem('speedData:'+email)||'{}'))}catch{}applyTheme(GS.theme)}
function title(){const t=GS.totalCorrects;if(t<50)return'🔰 かけだし計算係';if(t<200)return'🏃 計算ルーキー';if(t<500)return'🔥 暗算レーサー';if(t<1000)return'💎 計算マスター';return'👑 歩く電卓'}
function applyTheme(t){document.body.className='';if(t==='light')document.body.classList.add('theme-light');if(t==='black')document.body.classList.add('theme-black')}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('screen-'+id).classList.add('active');if(id==='start')updateStart()}
function updateStart(){const p=activeProfile();const label=p?(p.realName||p.displayName||p.email||p.studentId):activeEmail();document.getElementById('userBox').innerHTML=label?`${label}<br><b>${title()}</b><br>累計正解 ${GS.totalCorrects}問`:'ポータルからログインしてください。'}
function backPortal(){try{parent.postMessage({type:'studynext:back'},'*')}catch{} }
function showPanel(id){document.getElementById('panel-'+id).classList.add('active');if(id==='settings'){nameInput.value=GS.name;inputMode.value=GS.inputMode;theme.value=GS.theme;sfx.value=GS.sfx}}
function hidePanel(id){document.getElementById('panel-'+id).classList.remove('active')}
function saveSettings(){GS.name=nameInput.value.trim()||GS.name;GS.inputMode=inputMode.value;GS.theme=theme.value;GS.sfx=sfx.value;applyTheme(GS.theme);save();hidePanel('settings');updateStart()}
function goSelect(){showScreen('select');buildGrades();selectGrade(GS.grade);selectMode(GS.mode);selectLevel(GS.level)}
function buildGrades(){grades.innerHTML='';[1,2,3,4,5,6].forEach(g=>{const b=document.createElement('button');b.className='chip'+(g===GS.grade?' selected':'');b.textContent=g+'年生';b.onclick=()=>selectGrade(g);grades.appendChild(b)})}
function selectGrade(g){GS.grade=g;document.querySelectorAll('#grades .chip').forEach((c,i)=>c.classList.toggle('selected',i+1===g));if(!CURRICULUM[g].some(u=>u[0]===GS.unit))GS.unit=CURRICULUM[g][0][0];buildUnits();updateBest()}
function buildUnits(){units.innerHTML='';CURRICULUM[GS.grade].forEach(u=>{const b=document.createElement('button');b.className='chip'+(u[0]===GS.unit?' selected':'');b.textContent=u[1];b.onclick=()=>{GS.unit=u[0];buildUnits();updateBest()};units.appendChild(b)})}
function selectMode(m){GS.mode=m;['normal','survival','item'].forEach(x=>document.getElementById('mode-'+x).classList.toggle('selected',x===m));updateBest()}
function selectLevel(l){GS.level=l;document.querySelectorAll('[data-level]').forEach(c=>c.classList.toggle('selected',c.dataset.level===l));updateBest()}
function key(){return `${GS.unit}_${GS.level}_${GS.mode}`}
function updateBest(){best.textContent=GS.best[key()]?`自己ベスト ${GS.best[key()]}問`:''}
let audio=null;function tone(f,d=.08,type='sine'){if(GS.sfx==='off')return;try{audio=audio||new(window.AudioContext||window.webkitAudioContext)();const o=audio.createOscillator(),g=audio.createGain();o.connect(g);g.connect(audio.destination);o.type=type;o.frequency.value=f;g.gain.value=.22;g.gain.exponentialRampToValueAtTime(.001,audio.currentTime+d);o.start();o.stop(audio.currentTime+d)}catch{}}
function isNumericAnswer(ans){return /^-?\d+(\.\d+)?$/.test(String(ans).trim())}
function startGame(){GS.ghosts=GHOSTS.map(g=>({...g,score:Math.max(1,Math.round(g.score*(GS.level==='easy'?.75:GS.level==='hard'?1.25:1)))}));Object.assign(GS,{timer:60,score:0,total:0,streak:0,bestStreak:0,history:[],locked:false,answerBuffer:'',shield:false,item:null});GS.activeInput=GS.inputMode==='choice'?'choice':GS.inputMode==='type'?'type':GS.level==='hard'?'type':'choice';showScreen('game');buildCars();modeTag.textContent=`${GS.grade}年 / ${unitName()} / ${GS.mode} / ${GS.level}`;nextQ();startTimer();updateHud()}
function unitName(){return CURRICULUM[GS.grade].find(u=>u[0]===GS.unit)[1]}
function buildCars(){cars.innerHTML='<div id="playerCar" class="car">🏎️</div>';GS.ghosts.forEach((g,i)=>{const e=document.createElement('div');e.className='ghost';e.id='ghost'+i;e.style.top=(28+(i%4)*18)+'%';e.style.left='5%';e.innerHTML=`<small>${g.name}</small>${g.emoji}`;cars.appendChild(e)})}
function updateRace(){const max=Math.max(GS.score,...GS.ghosts.map(g=>g.score),1);playerCar.style.left=(5+Math.min(GS.score/max,1)*78)+'%';let r=1;GS.ghosts.forEach((g,i)=>{document.getElementById('ghost'+i).style.left=(5+Math.min(g.score/max,1)*78)+'%';if(g.score>GS.score)r++});rank.textContent=r;return r}
function startTimer(){clearInterval(GS.interval);GS.interval=setInterval(()=>{GS.timer=Math.round((GS.timer-.1)*10)/10;if(GS.timer<=0){GS.timer=0;endGame();return}updateHud()},100)}
function updateHud(){timer.textContent=Math.max(0,GS.timer).toFixed(1);timer.classList.toggle('danger',GS.timer<10);score.textContent=GS.score;streak.textContent=(GS.streak>=5?'🔥🔥':GS.streak>=3?'🔥':'⚡')+' ×'+(GS.streak>=5?3:GS.streak>=3?2:1);bar.style.width=Math.max(0,Math.min(100,GS.timer/60*100))+'%';updateRace()}
function nextQ(){if(!document.getElementById('screen-game').classList.contains('active'))return;GS.locked=false;GS.answerBuffer='';const unit=CURRICULUM[GS.grade].find(u=>u[0]===GS.unit);GS.question=unit[2]();if(GS.mode==='item'&&Math.random()<.22)GS.item=pick(['time','boost','shield']);else GS.item=null;context.textContent=GS.item?'🎁 アイテムチャンス':GS.question.context;question.textContent=GS.question.text;const useType=GS.activeInput==='type'&&isNumericAnswer(GS.question.answer);if(useType)showType();else showChoices(GS.level==='easy'?3:4);updateRace()}
function wrongs(ans,count){const s=new Set();let tries=0;while(s.size<count&&tries++<80){let w;if(isNumericAnswer(ans)){const n=parseFloat(ans);w=String(Math.round((n+pick([-3,-2,-1,1,2,3]))*10)/10);if(!String(ans).includes('.'))w=String(Math.round(parseFloat(w)))}else if(ans==='はい')w='いいえ';else if(ans==='いいえ')w='はい';else if(ans.includes(':'))w=pick(['1:1','2:3','3:4','4:5','5:6']);else w=pick(['はい','いいえ','同じ','わからない']);if(w!==String(ans))s.add(w)}return [...s]}
function showChoices(count){typeArea.style.display='none';choices.style.display='grid';choices.innerHTML='';const opts=[GS.question.answer,...wrongs(GS.question.answer,count-1)].sort(()=>Math.random()-.5);GS.choices=opts;GS.correctIndex=opts.indexOf(GS.question.answer);opts.forEach((o,i)=>{const b=document.createElement('button');b.className='choice';b.textContent=o;b.onclick=()=>answerChoice(i);choices.appendChild(b)});choices.style.gridTemplateColumns=count===3?'repeat(3,1fr)':'1fr 1fr'}
function showType(){choices.style.display='none';typeArea.style.display='block';answerInput.value='';setTimeout(()=>answerInput.focus(),50)}
function pressKey(k){if(GS.locked)return;if(k==='del')GS.answerBuffer=GS.answerBuffer.slice(0,-1);else if(k==='.'&&!GS.answerBuffer.includes('.'))GS.answerBuffer+='.';else if(k==='-'&&!GS.answerBuffer.startsWith('-'))GS.answerBuffer='-'+GS.answerBuffer;else if(k!=='-'&&k!=='.')GS.answerBuffer+=k;answerInput.value=GS.answerBuffer}
function submitTyped(){const v=answerInput.value.trim();if(v)checkAnswer(v)}
function answerChoice(i){if(GS.locked)return;GS.locked=true;const ok=i===GS.correctIndex;document.querySelectorAll('.choice').forEach((b,idx)=>{if(idx===i)b.classList.add(ok?'correct':'wrong');if(idx===GS.correctIndex)b.classList.add('correct')});process(ok);setTimeout(nextQ,420)}
function checkAnswer(v){if(GS.locked)return;GS.locked=true;const ok=v===GS.question.answer;answerInput.style.borderColor=ok?'var(--green)':'var(--red)';process(ok);setTimeout(nextQ,420)}
function process(ok){GS.total++;const before=updateRace();if(ok){GS.score++;GS.streak++;GS.bestStreak=Math.max(GS.bestStreak,GS.streak);const bonus=GS.streak>=5?5:GS.streak>=3?4:2;GS.timer=GS.mode==='survival'?GS.timer+bonus:Math.min(90,GS.timer+bonus);if(GS.item==='time')GS.timer=Math.min(90,GS.timer+8);if(GS.item==='boost')GS.score+=2;if(GS.item==='shield')GS.shield=true;toast(GS.item==='time'?'🕒 +8秒':GS.item==='boost'?'🚀 ブースト':GS.item==='shield'?'🛡️ シールド':'✓ 正解', 'var(--green)');tone(700);setTimeout(()=>tone(940),70);GS.history.push('ok')}else{if(GS.shield){GS.shield=false;toast('🛡️ 防御','var(--blue)')}else{GS.streak=0;GS.timer=GS.mode==='survival'?0:Math.max(0,GS.timer-3);toast(GS.mode==='survival'?'💀 終了':'× -3秒','var(--red)');tone(190,.12,'sawtooth')}GS.history.push('ng')}if(updateRace()<before)tone(1200,.12);drawHistory();updateHud()}
function toast(msg,color){const t=document.getElementById('toast');t.textContent=msg;t.style.color=color;t.classList.remove('show');void t.offsetWidth;t.classList.add('show')}
function drawHistory(){history.innerHTML='';GS.history.slice(-18).forEach(h=>{const d=document.createElement('div');d.className='dotHist '+(h==='ok'?'ok':'');history.appendChild(d)})}
function endGame(){clearInterval(GS.interval);showScreen('result');GS.totalCorrects+=GS.score;const all=[{name:GS.name,score:GS.score,you:true},...GS.ghosts].sort((a,b)=>b.score-a.score);const r=all.findIndex(x=>x.you)+1;const record=!GS.best[key()]||GS.score>GS.best[key()];if(record&&GS.score>0)GS.best[key()]=GS.score;save();window.StudyNextUsage&&window.StudyNextUsage.finishGame({grade:GS.grade,unit:unitName(),level:GS.level,mode:GS.mode,total:GS.total,correct:GS.score,accuracy:GS.total?Math.round(GS.score/GS.total*100):0,bestStreak:GS.bestStreak,rank:r});medal.textContent=r===1?'🥇':r===2?'🥈':r===3?'🥉':'🏁';resultRank.textContent=r+'位';resultMsg.textContent=record?'自己ベスト更新！':'次はさらに上へ。';resTotal.textContent=GS.total;resCorrect.textContent=GS.score;resAcc.textContent=(GS.total?Math.round(GS.score/GS.total*100):0)+'%';resStreak.textContent=GS.bestStreak}
document.addEventListener('keydown',e=>{if(!document.getElementById('screen-game').classList.contains('active')||GS.locked)return;if(typeArea.style.display==='block'&&e.key==='Enter')submitTyped();if(choices.style.display==='grid'&&['1','2','3','4'].includes(e.key)){const i=Number(e.key)-1;if(GS.choices[i])answerChoice(i)}});
(function init(){load();const email=activeEmail();if(email)GS.name=email.split('@')[0].slice(0,12)||GS.name;GS.unit=CURRICULUM[1][0][0];updateStart()})();
</script>
<script>
const StudyNextUsageBridge=(()=>{
  const PROFILE_KEY="studynext_profile_v3";
  let appStartedAt=new Date();
  let finished=false;
  function profile(){try{return JSON.parse(localStorage.getItem(PROFILE_KEY)||"null")}catch{return null}}
  function writeUsage(extra={}){
    if(finished&&extra.event!=="page_close")return;
    if(extra.event!=="page_close")finished=true;
    const p=profile()||{};
    const endedAt=new Date();
    const durationSec=Math.max(1,Math.round((endedAt-appStartedAt)/1000));
    const payload={uid:p.uid||"",studentId:p.studentId||"",realName:p.realName||p.displayName||p.email||"",classId:p.classId||"",teacherUid:p.teacherUid||"",appId:"speed",appTitle:"SPEED算数",startedAt:appStartedAt.toISOString(),endedAt:endedAt.toISOString(),durationSec,dateKey:endedAt.toISOString().slice(0,10),...extra};
    if(window.parent&&window.parent!==window){try{parent.postMessage({type:"studynext:usage",payload},"*")}catch{}}
  }
  window.StudyNextUsage={finishGame:result=>writeUsage({event:"game_result",result})};
  window.addEventListener("beforeunload",()=>{if(!finished)writeUsage({event:"page_close"})});
  return {writeUsage};
})();
</script>
