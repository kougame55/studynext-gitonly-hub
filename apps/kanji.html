<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>漢字スプリント</title><style>
:root{--bg:#f6f9ff;--ink:#142033;--muted:#65758d;--panel:#fff;--panel2:#eef5ff;--line:#d9e5f6;--accent:#1769ff;--accent2:#00a7c8;--ok:#0f9f6e;--bad:#d9365f;--shadow:0 18px 54px rgba(38,74,130,.16);--r:8px}
*{box-sizing:border-box}body{margin:0;min-height:100vh;background:linear-gradient(135deg,#f7fbff,#edf5ff);color:var(--ink);font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI","Noto Sans JP",sans-serif}button{font:inherit;cursor:pointer}.wrap{width:min(880px,100%);margin:auto;padding:22px}.top{display:flex;justify-content:space-between;align-items:center;gap:12px}.brand{font-weight:950;color:var(--accent)}.card{background:white;border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:20px}.q{font-size:clamp(3rem,14vw,7rem);font-weight:1000;text-align:center;margin:24px 0;color:var(--accent)}.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px}.choices button,.primary,.secondary{border:1px solid var(--line);border-radius:var(--r);font-weight:950;padding:14px;background:white;color:var(--ink)}.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;border:0}.secondary{background:var(--panel2)}.meta{color:var(--muted);line-height:1.6}.score{font-weight:950}.ok{color:var(--ok)}.bad{color:var(--bad)}@media(max-width:560px){.choices{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}}
</style></head><body><div class="wrap"><div class="top"><div><div class="brand">StudyNext / 漢字スプリント</div><p class="meta" id="user">ログイン情報を確認中</p></div><button class="secondary" onclick="backPortal()">ポータルへ</button></div><main class="card"><div class="meta">読みを選ぼう</div><div id="question" class="q">始</div><div id="choices" class="choices"></div><p id="status" class="score">0 / 0</p><button class="primary" style="width:100%;margin-top:12px" onclick="restart()">もう一度</button></main></div><script>
const PROFILE_KEY="studynext_profile_v3";const DATA=[["始","はじめる"],["終","おわる"],["遊","あそぶ"],["泳","およぐ"],["登","のぼる"],["調","しらべる"],["観","みる"],["働","はたらく"],["予","あらかじめ"],["径","みち"]];let i=0,ok=0,total=0,start=new Date();function profile(){try{return JSON.parse(localStorage.getItem(PROFILE_KEY)||"null")}catch{return null}}function shuffle(a){return [...a].sort(()=>Math.random()-.5)}function showUser(){const p=profile();user.textContent=p?(p.realName||p.displayName||p.email||p.studentId)+" で学習中":"ポータルから開くと記録されます"}function next(){if(i>=10){finish();return}const item=DATA[i%DATA.length];question.textContent=item[0];const opts=shuffle([item[1],...shuffle(DATA.map(x=>x[1]).filter(x=>x!==item[1])).slice(0,3)]);choices.innerHTML=opts.map(o=>`<button onclick="answer('${o.replace(/'/g,"\\'")}')">${o}</button>`).join("");status.textContent=`${ok} / ${total}`}function answer(v){total++;if(v===DATA[i%DATA.length][1])ok++;i++;next()}function restart(){i=0;ok=0;total=0;start=new Date();next()}function finish(){choices.innerHTML="";question.textContent="完了";status.innerHTML=`<span class="ok">${ok}</span> / ${total} 正解`;sendUsage({event:"app_result",result:{correct:ok,total}})}function sendUsage(extra){const p=profile();const end=new Date();try{parent.postMessage({type:"studynext:usage",payload:{appId:"kanji",appTitle:"漢字スプリント",uid:p?.uid||"",studentId:p?.studentId||"",realName:p?.realName||p?.displayName||p?.email||"",classId:p?.classId||"",teacherUid:p?.teacherUid||"",startedAt:start.toISOString(),endedAt:end.toISOString(),durationSec:Math.max(1,Math.round((end-start)/1000)),dateKey:end.toISOString().slice(0,10),...extra}},"*")}catch{}}function backPortal(){try{parent.postMessage({type:"studynext:back"},"*")}catch{}}showUser();next();
</script></body></html>
