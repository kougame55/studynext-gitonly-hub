<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>英単語リンク</title><style>
:root{--bg:#f6f9ff;--ink:#142033;--muted:#65758d;--panel:#fff;--panel2:#eef5ff;--line:#d9e5f6;--accent:#1769ff;--accent2:#00a7c8;--ok:#0f9f6e;--bad:#d9365f;--shadow:0 18px 54px rgba(38,74,130,.16);--r:8px}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:linear-gradient(135deg,#f7fbff,#edf5ff);color:var(--ink);font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI","Noto Sans JP",sans-serif}button{font:inherit;cursor:pointer}.wrap{width:min(900px,100%);margin:auto;padding:22px}.top{display:flex;justify-content:space-between;gap:12px}.brand{font-weight:950;color:var(--accent)}.card{background:white;border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:20px}.word{font-size:clamp(2.4rem,10vw,5.5rem);font-weight:1000;text-align:center;margin:26px 0;color:var(--accent)}.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px}.choices button,.primary,.secondary{border:1px solid var(--line);border-radius:var(--r);font-weight:950;padding:14px;background:white;color:var(--ink)}.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;border:0}.secondary{background:var(--panel2)}.meta{color:var(--muted);line-height:1.6}.ok{color:var(--ok);font-weight:950}@media(max-width:560px){.choices{grid-template-columns:1fr}.top{flex-direction:column}}
</style></head><body><div class="wrap"><div class="top"><div><div class="brand">StudyNext / 英単語リンク</div><p class="meta" id="user"></p></div><button class="secondary" onclick="backPortal()">ポータルへ</button></div><main class="card"><div class="meta">意味を選ぼう</div><div id="word" class="word"></div><div id="choices" class="choices"></div><p id="score" class="ok">0 / 0</p><button class="primary" style="width:100%;margin-top:12px" onclick="restart()">リスタート</button></main></div><script>
const PROFILE_KEY="studynext_profile_v3";const DATA=[["apple","りんご"],["river","川"],["school","学校"],["future","未来"],["energy","エネルギー"],["planet","惑星"],["bridge","橋"],["garden","庭"],["question","質問"],["answer","答え"]];let i=0,ok=0,total=0,start=new Date();const p=()=>{try{return JSON.parse(localStorage.getItem(PROFILE_KEY)||"null")}catch{return null}};const s=a=>[...a].sort(()=>Math.random()-.5);function init(){const me=p();user.textContent=me?(me.realName||me.displayName||me.email||me.studentId)+" で学習中":"ポータルから開くと記録されます";next()}function next(){if(i>=10)return finish();const item=DATA[i];word.textContent=item[0];choices.innerHTML=s([item[1],...s(DATA.map(x=>x[1]).filter(x=>x!==item[1])).slice(0,3)]).map(v=>`<button onclick="answer('${v}')">${v}</button>`).join("");score.textContent=`${ok} / ${total}`}function answer(v){total++;if(v===DATA[i][1])ok++;i++;next()}function restart(){i=0;ok=0;total=0;start=new Date();next()}function finish(){word.textContent="Finish";choices.innerHTML="";score.textContent=`${ok} / ${total} 正解`;sendUsage({event:"app_result",result:{correct:ok,total}})}function sendUsage(extra){const me=p(),end=new Date();parent.postMessage({type:"studynext:usage",payload:{appId:"english",appTitle:"英単語リンク",uid:me?.uid||"",studentId:me?.studentId||"",realName:me?.realName||me?.displayName||me?.email||"",classId:me?.classId||"",teacherUid:me?.teacherUid||"",startedAt:start.toISOString(),endedAt:end.toISOString(),durationSec:Math.max(1,Math.round((end-start)/1000)),dateKey:end.toISOString().slice(0,10),...extra}},"*")}function backPortal(){parent.postMessage({type:"studynext:back"},"*")}init();
</script></body></html>
