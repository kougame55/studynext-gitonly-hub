<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>タイピング道場</title><style>
:root{--bg:#f6f9ff;--ink:#142033;--muted:#65758d;--panel:#fff;--panel2:#eef5ff;--line:#d9e5f6;--accent:#1769ff;--accent2:#00a7c8;--ok:#0f9f6e;--bad:#d9365f;--shadow:0 18px 54px rgba(38,74,130,.16);--r:8px}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:linear-gradient(135deg,#f7fbff,#edf5ff);color:var(--ink);font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI","Noto Sans JP",sans-serif}button,input{font:inherit}.wrap{width:min(900px,100%);margin:auto;padding:22px}.top{display:flex;justify-content:space-between;gap:12px}.brand{font-weight:950;color:var(--accent)}.card{background:white;border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:20px}.target{font-size:clamp(1.6rem,5vw,3rem);font-weight:1000;line-height:1.3;margin:24px 0;color:var(--ink)}input{width:100%;padding:16px;border:2px solid var(--line);border-radius:var(--r);outline:none}input:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(23,105,255,.1)}.primary,.secondary{border:1px solid var(--line);border-radius:var(--r);font-weight:950;padding:14px;background:white;color:var(--ink);cursor:pointer}.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;border:0}.secondary{background:var(--panel2)}.meta{color:var(--muted);line-height:1.6}.score{font-weight:950;color:var(--accent)}@media(max-width:560px){.top{flex-direction:column}}
</style></head><body><div class="wrap"><div class="top"><div><div class="brand">StudyNext / タイピング道場</div><p id="user" class="meta"></p></div><button class="secondary" onclick="backPortal()">ポータルへ</button></div><main class="card"><div class="meta">表示された文をそのまま入力</div><div id="target" class="target"></div><input id="input" autocomplete="off" placeholder="ここに入力"><p id="score" class="score"></p><button class="primary" style="width:100%;margin-top:12px" onclick="restart()">リスタート</button></main></div><script>
const PROFILE_KEY="studynext_profile_v3";const DATA=["今日は新しいことを学びます","計算はゆっくり正確に進めます","理科では観察が大切です","社会では資料を読み取ります","英語の単語を声に出します","自分の考えを文章にします"];let i=0,ok=0,start=new Date();const p=()=>{try{return JSON.parse(localStorage.getItem(PROFILE_KEY)||"null")}catch{return null}};function next(){if(i>=DATA.length)return finish();target.textContent=DATA[i];input.value="";input.focus();score.textContent=`${ok} / ${i}`}input.addEventListener("keydown",e=>{if(e.key==="Enter"){if(input.value.trim()===DATA[i])ok++;i++;next()}});function restart(){i=0;ok=0;start=new Date();next()}function finish(){target.textContent="入力完了";input.style.display="none";score.textContent=`${ok} / ${DATA.length} 正確入力`;sendUsage({event:"app_result",result:{correct:ok,total:DATA.length}})}function sendUsage(extra){const me=p(),end=new Date();parent.postMessage({type:"studynext:usage",payload:{appId:"typing",appTitle:"タイピング道場",uid:me?.uid||"",studentId:me?.studentId||"",realName:me?.realName||me?.displayName||me?.email||"",classId:me?.classId||"",teacherUid:me?.teacherUid||"",startedAt:start.toISOString(),endedAt:end.toISOString(),durationSec:Math.max(1,Math.round((end-start)/1000)),dateKey:end.toISOString().slice(0,10),...extra}},"*")}function backPortal(){parent.postMessage({type:"studynext:back"},"*")}const me=p();user.textContent=me?(me.realName||me.displayName||me.email||me.studentId)+" で学習中":"ポータルから開くと記録されます";next();
</script></body></html>
