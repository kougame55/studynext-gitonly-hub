<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>StudyNext Hub Git?</title>
<style>
:root{--bg:#07111f;--card:#101d33;--line:rgba(255,255,255,.14);--text:#eef5ff;--muted:#9fb3d9;--accent:#76a9ff;--ok:#7cf0c3;--bad:#ff7e7e}
*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at top,#12305d,#07111f 46%,#040913);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;padding:16px}button,input{font:inherit}.wrap{width:min(860px,100%);margin:0 auto}.card{background:rgba(255,255,255,.07);border:1px solid var(--line);border-radius:18px;padding:20px;box-shadow:0 20px 60px rgba(0,0,0,.32)}h1{margin:0 0 8px;text-align:center;font-size:clamp(1.6rem,5vw,2.2rem)}.lead{text-align:center;color:var(--muted);margin:0 0 18px;line-height:1.6}.tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}.tabs button,.primary,.app,.ghost{border:1px solid var(--line);border-radius:12px;padding:13px;background:rgba(255,255,255,.06);color:var(--text);font-weight:800;cursor:pointer}.tabs button.active,.primary{background:var(--accent);border-color:var(--accent);color:#07111f}.form{display:grid;gap:12px}.form label{display:grid;gap:6px;color:var(--muted);font-size:.92rem}.form input{padding:14px;border-radius:12px;border:1px solid var(--line);background:rgba(255,255,255,.06);color:var(--text)}.msg{min-height:1.5em;margin-top:10px;text-align:center;font-weight:800;color:var(--bad)}.msg.ok{color:var(--ok)}.portal{display:none}.top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px}.apps{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px}.app{text-align:left;background:linear-gradient(145deg,rgba(118,169,255,.22),rgba(255,255,255,.06));min-height:110px}.app b{display:block;font-size:1.15rem;margin-bottom:8px}.app span{color:var(--muted);line-height:1.5}.runner{display:none;position:fixed;inset:0;background:#07111f;z-index:10}.runnerBar{height:52px;display:flex;align-items:center;gap:10px;padding:8px;background:#0b1728;border-bottom:1px solid var(--line)}.runnerTitle{font-weight:900;flex:1}.runner iframe{width:100%;height:calc(100vh - 52px);border:0;background:#000}.note{margin-top:14px;color:var(--muted);font-size:.86rem;line-height:1.6}.small{font-size:.82rem;color:var(--muted);text-align:center;margin-top:10px}@media(max-width:560px){.top{flex-direction:column;align-items:stretch}.runnerBar{height:58px}.runner iframe{height:calc(100vh - 58px)}}
</style>
</head>
<body>
<div class="wrap">
  <section id="auth" class="card">
    <h1>StudyNext Hub</h1>
    <p class="lead">GAS???Cloudflare???Google Sites???????????????GitHub?????????</p>
    <div class="tabs"><button id="loginTab" class="active" type="button">????</button><button id="registerTab" type="button">????</button></div>
    <form id="authForm" class="form">
      <label>???????<input id="email" type="email" autocomplete="email" required></label>
      <label>?????<input id="password" type="password" minlength="4" autocomplete="current-password" required></label>
      <button class="primary" id="submit" type="submit">????</button>
    </form>
    <div id="message" class="msg"></div>
    <div class="small">?????????????????????DB????????????????</div>
  </section>

  <section id="portal" class="portal card">
    <div class="top"><div><h1 style="text-align:left;margin:0">????</h1><div id="welcome" class="lead" style="text-align:left;margin:4px 0 0"></div></div><button class="ghost" id="logout" type="button">?????</button></div>
    <div id="apps" class="apps"></div>
    <div class="note">??????GitHub? <code>apps.json</code> ? <code>apps/*.html</code> ????????Google Sites????????</div>
  </section>
</div>

<div id="runner" class="runner">
  <div class="runnerBar"><button class="ghost" id="back" type="button">? ????</button><div id="runnerTitle" class="runnerTitle">???</div><button class="ghost" id="reload" type="button">???</button></div>
  <iframe id="appFrame" sandbox="allow-scripts allow-forms allow-same-origin allow-popups allow-modals allow-downloads"></iframe>
</div>
<script>
'use strict';
const RAW_BASE = 'https://raw.githubusercontent.com/kougame55/studynext-gitonly-hub/main/';
const ACCOUNTS_KEY = 'studynext_gitonly_accounts_v1';
const ACTIVE_KEY = 'studynext_active_user_v1';
let mode = 'login';
let currentApp = null;
const $ = id => document.getElementById(id);
function setMode(next){mode=next;$('loginTab').classList.toggle('active',mode==='login');$('registerTab').classList.toggle('active',mode==='register');$('submit').textContent=mode==='login'?'????':'????';showMessage('')}
function showMessage(text,kind=''){const el=$('message');el.textContent=text;el.className='msg '+kind}
function getAccounts(){try{return JSON.parse(localStorage.getItem(ACCOUNTS_KEY)||'{}')}catch(e){return {}}}
function setAccounts(accounts){localStorage.setItem(ACCOUNTS_KEY,JSON.stringify(accounts))}
async function hash(text){const bytes=new TextEncoder().encode(text);const digest=await crypto.subtle.digest('SHA-256',bytes);return [...new Uint8Array(digest)].map(b=>b.toString(16).padStart(2,'0')).join('')}
async function handleAuth(event){event.preventDefault();const email=$('email').value.trim().toLowerCase();const password=$('password').value;const accounts=getAccounts();if(!email||!password){showMessage('????????');return}if(mode==='register'){if(accounts[email]){showMessage('??????');return}accounts[email]={passwordHash:await hash(password),createdAt:new Date().toISOString()};setAccounts(accounts);localStorage.setItem(ACTIVE_KEY,JSON.stringify({email,loginAt:new Date().toISOString()}));openPortal(email);return}if(!accounts[email]||accounts[email].passwordHash!==await hash(password)){showMessage('??????????????????');return}localStorage.setItem(ACTIVE_KEY,JSON.stringify({email,loginAt:new Date().toISOString()}));openPortal(email)}
function activeUser(){try{return JSON.parse(localStorage.getItem(ACTIVE_KEY)||'null')}catch(e){return null}}
function openPortal(email){$('auth').style.display='none';$('portal').style.display='block';$('welcome').textContent=email+' ??????';loadApps()}
async function loadApps(){const box=$('apps');box.innerHTML='<div class="lead">GitHub?????????????...</div>';try{const res=await fetch(RAW_BASE+'apps.json?ts='+Date.now(),{cache:'no-store'});if(!res.ok)throw new Error('apps_json_load_failed');const apps=await res.json();box.innerHTML='';apps.forEach(app=>{const button=document.createElement('button');button.className='app';button.type='button';button.innerHTML='<b>'+escapeHtml(app.title)+'</b><span>'+escapeHtml(app.description||'')+'</span>';button.onclick=()=>openApp(app);box.appendChild(button)})}catch(e){box.innerHTML='<div class="msg">GitHub?? apps.json ??????????</div>'}}
function escapeHtml(text){return String(text).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
async function openApp(app){currentApp=app;$('runnerTitle').textContent=app.title;$('runner').style.display='block';$('appFrame').srcdoc='<p style="font-family:sans-serif;padding:20px">?????...</p>';try{const res=await fetch(RAW_BASE+app.src+'?ts='+Date.now(),{cache:'no-store'});if(!res.ok)throw new Error('app_load_failed');let html=await res.text();const active=activeUser();try{localStorage.setItem(ACTIVE_KEY,JSON.stringify(active||{email:'guest@local',loginAt:new Date().toISOString()}))}catch(e){}$('appFrame').srcdoc=html}catch(e){$('appFrame').srcdoc='<p style="font-family:sans-serif;padding:20px;color:red">???????????????</p>'}}
function closeApp(){$('runner').style.display='none';$('appFrame').srcdoc=''}
$('loginTab').onclick=()=>setMode('login');$('registerTab').onclick=()=>setMode('register');$('authForm').onsubmit=handleAuth;$('logout').onclick=()=>{localStorage.removeItem(ACTIVE_KEY);location.reload()};$('back').onclick=closeApp;$('reload').onclick=()=>currentApp&&openApp(currentApp);window.addEventListener('message',event=>{if(event.data&&event.data.type==='studynext:back')closeApp()});const active=activeUser();if(active&&active.email)openPortal(active.email);
</script>
</body>
</html>
